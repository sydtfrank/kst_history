<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裝置尺寸檢測 & 截圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #007bff; text-align: center; }
        .info-group { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .label { font-size: 0.9rem; color: #666; display: block; }
        .value { font-size: 1.4rem; font-weight: bold; color: #222; }
        
        /* 按鈕樣式 */
        .btn-container { text-align: center; margin-top: 20px; }
        #downloadBtn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        #downloadBtn:active { background-color: #1e7e34; }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <h1>裝置資訊檢測</h1>
    
    <div class="info-group">
        <span class="label">瀏覽器寬度 (Viewport Width)</span>
        <span class="value" id="vw">-</span> px
    </div>

    <div class="info-group">
        <span class="label">瀏覽器高度 (Viewport Height)</span>
        <span class="value" id="vh">-</span> px
    </div>

    <div class="info-group">
        <span class="label">裝置像素比 (DPR)</span>
        <span class="value" id="dpr">-</span>
    </div>

    <div class="info-group">
        <span class="label">螢幕物理寬度 (Screen Width)</span>
        <span class="value" id="sw">-</span> px
    </div>

    <div class="btn-container">
        <button id="downloadBtn">下載截圖 (Download Screenshot)</button>
    </div>
</div>

<script>
    function updateInfo() {
        document.getElementById('vw').innerText = window.innerWidth;
        document.getElementById('vh').innerText = window.innerHeight;
        document.getElementById('dpr').innerText = window.devicePixelRatio;
        document.getElementById('sw').innerText = screen.width;
    }

    // 截圖下載功能
    document.getElementById('downloadBtn').addEventListener('click', function() {
        const btn = this;
        btn.innerText = '正在生成圖片...';
        btn.style.opacity = '0.5';

        // 隱藏按鈕本身，避免截圖裡出現下載按鈕
        btn.style.display = 'none';

        html2canvas(document.getElementById('captureArea')).then(canvas => {
            // 將 canvas 轉為圖片網址
            const link = document.createElement('a');
            link.download = `device-info-${window.innerWidth}x${window.innerHeight}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();

            // 恢復按鈕
            btn.innerText = '下載截圖 (Download Screenshot)';
            btn.style.opacity = '1';
            btn.style.display = 'block';
        });
    });

    window.onload = updateInfo;
    window.onresize = updateInfo;
</script>

</body>
</html>
