<!DOCTYPE html>
<html lang="tw">

<head>
    <meta charset="utf-8">
    <meta http-equiv="expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
    <title>歷史時光機</title>
    <link rel="stylesheet" href="templates/art_ckeditor.css">
    <link rel="stylesheet" href="templates/art.css">
</head>

<body class="body_home">

    <canvas id="glcanvas"></canvas>
    <canvas id="tunnelCanvas"></canvas>
    <div id="bg_obj">
        <div class="obj_item"></div>
        <div class="obj_item"></div>
        <div class="obj_item"></div>
        <div class="obj_item"></div>
        <div class="obj_item"></div>
        <div class="obj_item"></div>
    </div>


    <div class="home_wrapper">
        <div class="box_L">
            <!-- 飛船區 開始 -->
            <div class="fly_box">
                <img class="img_fly" src="templates/images/fly.svg">
            </div>
            <!-- 飛船區 結束 -->
        </div>

        <div class="box_R">
            <!-- 首頁-LOGO 開始 -->
            <div class="home_logo_box">
                <img src="templates/images/logo.svg">
            </div>
            <!-- 首頁-LOGO 結束 -->


            <!-- 首頁-選單 開始 -->
            <div class="home_menu_box">
                <!-- 左側控制區 -->
                <div class="home_func_box">
                    <div class="star-track" id="starTrack">
                        <div class="star-handle" id="starHandle">
                            <img src="templates/images/btn_star.svg">
                        </div>
                    </div>
                </div>

                <!-- 右側選單區 -->
                <div class="menu_list_wrapper">
                    <div class="menu_list_container" id="menuContainer">
                        <div class="menu_item" data-index="0" data-link="epoch_1.html">
                            <div class="menu_item_inner"><span>史前時代</span></div>
                        </div>
                        <div class="menu_item" data-index="1" data-link="epoch_2.html">
                            <div class="menu_item_inner"><span>大航海時代</span></div>
                        </div>
                        <div class="menu_item" data-index="2" data-link="epoch_3.html">
                            <div class="menu_item_inner"><span>清帝國時代</span></div>
                        </div>
                        <div class="menu_item" data-index="3" data-link="epoch_4.html">
                            <div class="menu_item_inner"><span>日治時代</span></div>
                        </div>
                        <div class="menu_item" data-index="4" data-link="epoch_5.html">
                            <div class="menu_item_inner"><span>中華民國</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 首頁-選單 結束 -->
        </div>
    </div>

    <!-- 首頁-頁尾 開始 -->
    <div class="home_footer_box">
        <img src="templates/images/kst_logo.png">
    </div>
    <!-- 首頁-頁尾 結束 -->


    <svg style="display: none;">
        <defs>
            <filter id="hand-drawn-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>


    <script src="templates/jquery-3.7.1.min.js"></script>
    <script src="templates/gl_canvas.js"></script>
    <script src="templates/tunnel_canvas.js"></script>
    <script src="templates/art.js"></script>

    <script>
        $(document).ready(function () {
            /**/
        });
    </script>

</body>

</html>
