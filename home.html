<!DOCTYPE html>
<html lang="tw">

<head>
    <meta charset="utf-8">
    <meta http-equiv="expires" content="0">

    <title>歷史時光機</title>
    <link rel="stylesheet" href="templates/art_ckeditor.css">

<body class="body_home">

    <canvas id="glcanvas"></canvas>
    <canvas id="tunnelCanvas"></canvas>
    <div id="bg_obj">

        <div class="box_R">
            <!-- 首頁-LOGO 開始 -->
            <div class="home_logo_box">
                <img src="templates/images/logo.svg">

            <div class="home_menu_box">

                <div class="home_func_box">
                    <button class="c_btn" id="home_prevBtn" aria-label="上一個">
                        <svg viewBox="0 0 24 24">
                            <path d="m18 15-6-6-6 6" stroke-width="3" />

                    </button>
                    <button class="c_btn" id="home_nextBtn" aria-label="下一個">

                    <li>

                    </li>

        </div>
    </div>

    <!-- 首頁-頁尾 開始 -->
    <div class="home_footer_box">
        <img src="templates/images/kst_logo.png">
    </div>
    <!-- 首頁-頁尾 結束 -->


    <svg style="display: none;">
        <defs>
            <filter id="hand-drawn-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>


    <script src="templates/jquery-3.7.1.min.js"></script>
