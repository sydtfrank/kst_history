<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史時代選單</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto:wght@400;700&display=swap');

        @font-face {
            font-family: 'SweiMarkerSansCJKtc-Regular';
            src: url('https://cdn.jsdelivr.net/gh/max32002/swei-marker-sans@2.0/WebFont/CJK%20TC/SweiMarkerSansCJKtc-Regular.woff2') format('woff2');
        }

        :root {
            --primary-bg: #e3e4ec;
            --active-bg: #ffffff;
            --inactive-bg: #d0d3df;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            /* 防止拖拉時選中文字 */
        }

        body {
            font-family: 'Roboto', 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 主容器 - 移除直接濾鏡，改用偽元素以保護內部文字 */
        .home_menu_box {
            position: relative;
            display: flex;
            width: 100%;
            max-width: 480px;
            padding: 25px 30px;
            z-index: 1;
        }

        /* 主容器的手繪背景層 */
        .home_menu_box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-bg);
            border: 3px solid #000;
            border-radius: 40px 0 0 0;
            filter: url(#hand-drawn-filter);
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.05);
            z-index: -1;
        }

        /* 左側功能區 */
        .home_func_box {
            width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            z-index: 10;
        }

        /* 星星滑桿軌道 */
        .star-track {
            position: relative;
            width: 26px;
            height: 220px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 2px;
            cursor: pointer;
            filter: url(#hand-drawn-filter);
        }

        .star-track::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background: #000;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .star-handle {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            top: 0%;
            cursor: grab;
            z-index: 20;
        }

        .star-handle:active {
            cursor: grabbing;
        }

        .star-handle img {
            width: 48px;
            height: 48px;
            display: block;
            filter: drop-shadow(2px 2px 0px rgba(0, 0, 0, 0.2));
        }

        /* 右側選單列表 */
        .menu_list_wrapper {
            flex: 1;
            height: 240px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .menu_list_container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.5s ease-in-out;
        }

        .menu_item {
            width: 100%;
            position: relative;
            cursor: pointer;
            transition: all 0.5s;
            margin-top: -18px;
        }

        .menu_item:first-child {
            margin-top: 0;
        }

        /* 項目內框 - 移除濾鏡，改用偽元素裝載濾鏡 */
        .menu_item_inner {
            width: 100%;
            padding: 12px 10px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* 項目背景層 - 僅在此處套用濾鏡，使背景扭曲但文字清晰 */
        .menu_item_inner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--inactive-bg);
            border: 3px solid #999;
            border-radius: 2px 4px 3px 6px / 6px 3px 5px 2px;
            filter: url(#hand-drawn-filter);
            z-index: -1;
            transition: all 0.4s;
        }

        .menu_item span {
            font-family: 'SweiMarkerSansCJKtc-Regular', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #666;
            letter-spacing: 6px;
            transition: all 0.4s;
            display: block;
            pointer-events: none;
            /* 文字不套用濾鏡 */
        }

        /* 選中狀態 */
        .menu_item.active {
            z-index: 100;
        }

        .menu_item.active .menu_item_inner::after {
            background: var(--active-bg);
            border-color: #000;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .menu_item.active span {
            color: #000;
            letter-spacing: 10px;
        }

        /* 距離太遠的項目透明度 */
        .menu_item.far {
            opacity: 0.3;
            filter: blur(1px);
        }

        @media (max-width: 480px) {
            .menu_item span {
                font-size: 20px;
                letter-spacing: 2px;
            }

            .menu_item.active span {
                letter-spacing: 4px;
            }
        }
    </style>
</head>

<body>

    <!-- SVG 濾鏡定義 -->
    <svg style="display: none;">
        <defs>
            <filter id="hand-drawn-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div class="home_menu_box">
        <!-- 左側控制區 -->
        <div class="home_func_box">
            <div class="star-track" id="starTrack">
                <div class="star-handle" id="starHandle">
                    <img src="https://sydtfrank.github.io/kst_history/templates/images/btn_star.svg" alt="star icon">
                </div>
            </div>
        </div>

        <!-- 右側選單區 -->
        <div class="menu_list_wrapper">
            <div class="menu_list_container" id="menuContainer">
                <div class="menu_item" data-index="0" data-link="epoch_1.html">
                    <div class="menu_item_inner"><span>史前時代</span></div>
                </div>
                <div class="menu_item" data-index="1" data-link="epoch_2.html">
                    <div class="menu_item_inner"><span>大航海時代</span></div>
                </div>
                <div class="menu_item" data-index="2" data-link="epoch_3.html">
                    <div class="menu_item_inner"><span>清帝國時代</span></div>
                </div>
                <div class="menu_item" data-index="3" data-link="epoch_4.html">
                    <div class="menu_item_inner"><span>日治時代</span></div>
                </div>
                <div class="menu_item" data-index="4" data-link="epoch_5.html">
                    <div class="menu_item_inner"><span>中華民國</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            let selectedIndex = 0;
            const $items = $('.menu_item');
            const totalItems = $items.length;
            const $container = $('#menuContainer');
            const $star = $('#starHandle');
            const $track = $('#starTrack');

            // --- 新增：設定星星的移動範圍 (百分比) ---
            const minRange = 15; // 距離頂端 15%
            const maxRange = 85; // 距離底端 15% (即 85% 處)
            const activeRange = maxRange - minRange; // 實際可變動範圍 70%

            let isDragging = false;

            function updateUI(smoothStar = true) {
                // 1. 更新項目狀態與層級
                $items.each(function (index) {
                    const $item = $(this);
                    const distance = Math.abs(index - selectedIndex);
                    $item.removeClass('active far');

                    if (index === selectedIndex) {
                        $item.addClass('active');
                    } else if (distance > 1) {
                        $item.addClass('far');
                    }
                    $item.css('z-index', 10 - distance);
                });

                // 2. 移動容器
                const translateY = (1.5 - selectedIndex) * 50;
                $container.css('transform', `translateY(${translateY}px)`);

                // 3. 移動星星 (套用範圍限制)
                if (smoothStar) {
                    $star.css('transition', 'top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)');
                    // 將 index 比例映射到 minRange ~ maxRange
                    const starPercent = minRange + (selectedIndex / (totalItems - 1)) * activeRange;
                    $star.css('top', `${starPercent}%`);
                }
            }

            function handleTrackInteraction(e) {
                const rect = $track[0].getBoundingClientRect();
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let offsetY = clientY - rect.top;

                offsetY = Math.max(0, Math.min(offsetY, rect.height));
                const percent = offsetY / rect.height; // 這是滑鼠在軌道上的真實比例 (0~1)

                // 計算對應的 Index
                const newIndex = Math.round(percent * (totalItems - 1));

                if (newIndex !== selectedIndex) {
                    selectedIndex = newIndex;
                    updateUI(false);
                }

                // 移動星星 (拖動時的即時視覺反饋，也要套用範圍限制)
                $star.css('transition', 'none');
                const visualPercent = minRange + (percent * activeRange);
                $star.css('top', `${visualPercent}%`);
            }

            // ... 以下事件監聽 (mousedown, mousemove, click 等) 保持不變 ...
            $track.on('mousedown touchstart', function (e) {
                isDragging = true;
                handleTrackInteraction(e);
                e.preventDefault();
            });

            $(document).on('mousemove touchmove', function (e) {
                if (isDragging) {
                    handleTrackInteraction(e);
                }
            });

            $(document).on('mouseup touchend', function () {
                if (isDragging) {
                    isDragging = false;
                    updateUI(true);
                }
            });

            $items.on('click', function () {
                const index = parseInt($(this).data('index'));
                const link = $(this).data('link');

                if (index === selectedIndex) {
                    window.location.href = link;
                } else {
                    selectedIndex = index;
                    updateUI(true);
                }
            });

            updateUI(true);
        });
    </script>
</body>

</html>
